<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Supermarket Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card shadow" style="width: 420px;">
        <div class="card-body p-4">

            <h3 class="text-center mb-4">System Login</h3>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="alert alert-danger">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <form method="post" action="/login">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text"
                           name="username"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password"
                           name="password"
                           class="form-control"
                           required>
                </div>

                {% if captcha_code %}
                <div class="mb-3">
                    <label class="form-label">Verification Code</label>
                    <div class="input-group">
                        <span class="input-group-text fw-bold">{{ captcha_code }}</span>
                        <input type="text"
                               name="captcha"
                               class="form-control"
                               placeholder="Enter the code"
                               required>
                    </div>
                </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100">
                    Login
                </button>

                <div class="text-center mt-3">
                    <a href="/register">Create a cashier account</a>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
