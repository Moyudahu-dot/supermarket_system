{% extends "base.html" %}

{% block content %}
<h2>User Management</h2>

<div class="card mb-4">
    <div class="card-header">
        Add User
    </div>

    <div class="card-body">
        <form method="post" action="/users/add">
            <div class="row g-3">

                <div class="col-md-4">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Password</label>
                    <input type="text" name="password" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Role</label>
                    <select name="role" class="form-control">
                        <option value="admin">admin</option>
                        <option value="manager">manager</option>
                        <option value="cashier">cashier</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Full Name</label>
                    <input type="text" name="full_name" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control">
                </div>

            </div>

            <div class="row mt-4">
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">
                        Add User
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>


<div class="card mt-3">
    <div class="card-header">
        User List
    </div>

    <div class="card-body">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Full Name</th>
                <th>Phone</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody>
            {% for u in users %}
            <tr onclick="fillUserForm(this)">
                <td>{{ u[0] }}</td>
                <td>{{ u[1] }}</td>
                <td>{{ u[2] }}</td>
                <td>{{ u[3] }}</td>
                <td>{{ u[4] }}</td>
                <td>{{ u[5] }}</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>


<div class="card mt-4">
    <div class="card-header">
        Edit User
    </div>

    <div class="card-body">
        <form method="post" action="/users/update">

            <div class="row g-3">

                <div class="col-md-2">
                    <label>User ID</label>
                    <input type="text" id="user_id" name="user_id" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label>Phone</label>
                    <input type="text" id="phone" class="form-control" readonly>
                </div>

                <div class="col-md-3">
                    <label>Role</label>
                    <select id="role" name="role" class="form-control">
                        <option value="admin">admin</option>
                        <option value="manager">manager</option>
                        <option value="cashier">cashier</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label>Status</label>
                    <select id="status" name="status" class="form-control">
                        <option value="active">active</option>
                        <option value="inactive">inactive</option>
                    </select>
                </div>

            </div>

            <div class="row g-2 mt-4">
                <div class="col-md-4">
                    <button type="submit" class="btn btn-success w-100">
                        Update
                    </button>
                </div>

                <div class="col-md-4">
                    <button type="button"
                            class="btn btn-danger w-100"
                            onclick="deleteUser()">
                        Delete
                    </button>
                </div>
            </div>

        </form>
    </div>
</div>


<script>
function fillUserForm(row) {
    let rows = document.querySelectorAll("tbody tr");

    rows.forEach(r => {
        r.classList.remove("table-primary");
    });

    row.classList.add("table-primary");

    let cells = row.getElementsByTagName("td");

    document.getElementById("user_id").value = cells[0].innerText;
    document.getElementById("username").value = cells[1].innerText;
    document.getElementById("phone").value = cells[4].innerText;
    document.getElementById("role").value = cells[2].innerText;
    document.getElementById("status").value = cells[5].innerText;
}


function deleteUser() {
    let userId = document.getElementById("user_id").value;

    if (!userId) {
        alert("Please select a user.");
        return;
    }

    let confirmDelete = confirm("Are you sure you want to delete this user?");

    if (confirmDelete) {
        window.location.href = "/users/delete/" + userId;
    }
}
</script>

{% endblock %}
